<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Scheduler</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  padding:10px;
}

button{
  margin:4px;
  padding:8px 10px;
  border-radius:6px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
}

input{
  padding:6px;
  border-radius:6px;
  border:none;
}

.slot{
  border:1px solid #444;
  padding:6px;
  margin:6px 0;
  border-radius:6px;
}

.student{
  display:inline-block;
  background:#333;
  padding:4px 6px;
  margin:2px;
  border-radius:6px;
}

.hint{
  font-size:10px;
  opacity:0.6;
  margin-left:4px;
}
</style>
</head>

<body>

<h2>Lesson Scheduler</h2>

<input id="nameInput" placeholder="Student name">
<button onclick="addStudent()">Add Student</button>
<button onclick="build()">Auto Build</button>

<h3>Students</h3>
<div id="students"></div>

<h3>Schedule</h3>
<div id="schedule"></div>

<h3>Waitlist</h3>
<div id="waitlist"></div>

<script>

let students = JSON.parse(localStorage.getItem("students")||"[]");
let availability = JSON.parse(localStorage.getItem("availability")||"{}");

let schedule = {};
let waitlist = [];

let days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
let slots = ["Morning","Afternoon","Evening"];

function save(){
  localStorage.setItem("students", JSON.stringify(students));
  localStorage.setItem("availability", JSON.stringify(availability));
}

function addStudent(){
  let name = document.getElementById("nameInput").value;
  if(!name) return;

  students.push({name,group:1});
  availability[name] = [];

  save();
  renderStudents();
}

function build(){

  schedule = {};
  waitlist = [];

  days.forEach(d=>{
    schedule[d]={};
    slots.forEach(s=>{
      schedule[d][s]=[];
    });
  });

  students.forEach(st=>{
    let placed=false;

    for(let d of days){
      for(let s of slots){
        let group = schedule[d][s];

        if(group.length<4){
          group.push(st.name);
          placed=true;
          break;
        }
      }
      if(placed) break;
    }

    if(!placed){
      waitlist.push(st.name);
    }

  });

  render();
}

function render(){

  let out="";

  days.forEach(d=>{
    out+=`<h3>${d}</h3>`;

    slots.forEach(s=>{
      let g = schedule[d][s];

      if(g.length>0){
        out+=`<div class="slot"><b>${s}</b><br>`;

        g.forEach(n=>{
          out+=`<span class="student">${n}</span>`;
        });

        out+=`</div>`;
      }
    });

  });

  document.getElementById("schedule").innerHTML = out;

  renderWaitlist();
}

function renderWaitlist(){
  let out="";

  waitlist.forEach(name=>{
    out+=`<div>${name}</div>`;
  });

  document.getElementById("waitlist").innerHTML = out || "None";
}

function renderStudents(){
  let out="";
  students.forEach(s=>{
    out+=`<div>${s.name}</div>`;
  });
  document.getElementById("students").innerHTML=out;
}

renderStudents();
build();

</script>

</body>
</html>
